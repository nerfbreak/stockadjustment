# ─────────────────────────────────────────────────────────────
#  .streamlit/config.toml  —  StockEngine Dark Blue Theme
# ─────────────────────────────────────────────────────────────

[theme]
primaryColor = "#2563eb"
backgroundColor = "#0f172a"
secondaryBackgroundColor = "#1e293b"
textColor = "#f0f6fc"
font = "sans serif"

[server]
maxUploadSize            = 200
enableCORS               = false
enableXsrfProtection     = true
runOnSave                = false

[browser]
gatherUsageStats         = false

[runner]
fastReruns               = true
