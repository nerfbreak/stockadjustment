# ─────────────────────────────────────────────────────────────
#  .streamlit/config.toml  —  StockEngine Dark Blue Theme
# ─────────────────────────────────────────────────────────────

[theme]
base                     = "dark"
primaryColor             = "#3b82f6"
backgroundColor          = "#070d1a"
secondaryBackgroundColor = "#0d1526"
textColor                = "#e8eef8"
font                     = "sans serif"

[server]
maxUploadSize            = 200
enableCORS               = false
enableXsrfProtection     = true
runOnSave                = false

[browser]
gatherUsageStats         = false

[runner]
fastReruns               = true
